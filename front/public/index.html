<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4A1942" />
    <meta name="description" content="CycleTracker — Application de suivi de cycle menstruel pour les jeunes Malagasy" />

    <!--
      FICHIER : public/index.html
      RÔLE    : Squelette HTML dans lequel React injecte l'application.
                La balise <div id="root"> est le point d'ancrage de React.
                Les polices Google Fonts sont chargées ici car elles
                doivent être disponibles avant le rendu CSS.
    -->

    <!-- Polices : Cormorant Garamond (titres élégants) + DM Sans (corps de texte) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>CycleTracker 🌸</title>
  </head>
  <body>
    <noscript>Vous devez activer JavaScript pour utiliser CycleTracker.</noscript>

    <!-- React monte l'application entière dans cette balise -->
    <div id="root"></div>
  </body>
</html>
